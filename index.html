<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>James London | Architect of Restoration</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="top-bar">
  <div class="logo">JAMES LONDON</div>
  <nav class="command-nav">
    <button>FOUNDER'S VOICE</button>
    <button>RESTORATION LOG</button>
    <button>MY COMMS</button>
  </nav>
</header>

<main>
  <section class="hero">

    <!-- Background Grid -->
    <div class="grid-layer"></div>

    <!-- Phoenix Core -->
    <div class="phoenix-core">
      <img src="assets/phoenix.png" alt="Phoenix JL">
    </div>

    <!-- Protocol Nodes -->
    <div class="protocol protocol-a">PROTOCOL A: SYNTHETIC REBIRTH</div>
    <div class="protocol protocol-b">PROTOCOL B: DIGITAL INTEGRITY</div>
    <div class="protocol protocol-c">PROTOCOL C: SPATIAL SYNTHESIS</div>

    <!-- Headline -->
    <div class="headline">
      <h1>THE ARCHITECT OF RESTORATION</h1>
      <p>(Restoring the Future: Faith, Space, Code.)</p>
    </div>

    <!-- CTA -->
    <button class="cta">INITIATE PROTOCOL</button>

  </section>
</main>

<!-- System Controls -->
<div class="system-controls">⚙️</div>

<script src="js/main.js"></script>
</body>
</html>
