<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James London | Architect of Restoration</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SCENE -->
    <div class="scene">
        <div class="background"></div>
        <canvas id="rainCanvas"></canvas>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-text">JAMES LONDON</div>

        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Mission</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container">

        <div class="parchment">

            <!-- LOGO -->
            <div class="center-logo">
                <img src="assets/phoenix.png" alt="Phoenix Logo">
            </div>

            <!-- ✅ STACKED CONTENT (NOT SIDE BY SIDE) -->
            <div class="content">

                <div class="section">
                    <h2>Protocol A</h2>
                    <p>Foundation of restoration framework.</p>
                </div>

                <div class="section">
                    <h2>Protocol B</h2>
                    <p>Execution and transformation layer.</p>
                </div>

                <div class="section">
                    <h2>Protocol C</h2>
                    <p>Expansion and dominion scaling.</p>
                </div>

            </div>

        </div>

    </main>

    <script src="js/main.js"></script>

</body>
</html>
